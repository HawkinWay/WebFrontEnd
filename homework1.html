<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form name = "ListName" id = "" action = "location" method = "post">
        <fieldset>
            <legend>基本信息</legend>
            姓名：<input type="text" required name="username">
            性别:<input type="radio" name="gender" value="男">男
                <input type="radio" name="gender" value="女">女
            <br/>
            手机：<input type="text" name="phone">
            邮箱：<input type="email" name="email" size="25">
            <select name="emailtype">
                <option value="qq">@qq.com</option>
                <option value="126">@126.com</option>
                <option value="163">@163.com</option>
                <option value="gmail">@gmail.com</option>
            </select>
            <br/>
            住址：<input type="text" name="address" size="50">
            <br/>
            头像：<input type="file" name="profile picture">未选择任何文件
        </fieldset>
        <br/>
        <fieldset>
            <legend>个人爱好</legend>
            体育：<br/>
            <input type="checkbox" name="hobbies"> 足球
            <input type="checkbox" name="hobbies"> 篮球
            <input type="checkbox" name="hobbies"> 羽毛球
            <input type="checkbox" name="hobbies"> 乒乓球
            <br/>
            音乐：<br/>
            <input type="checkbox" name="hobbies"> 民谣
            <input type="checkbox" name="hobbies"> 爵士
            <input type="checkbox" name="hobbies"> 摇滚
            <input type="checkbox" name="hobbies"> 说唱
            <input type="checkbox" name="hobbies"> 乡村
            <br/>
        </fieldset>
        <br/>
        阅读服务条款：
        <textarea rows="5" cols="20">请仔细阅读服务条款&#10请仔细阅读服务条款&#13请仔细阅读服务条款
        </textarea>
        <br/>
        <input type="button" name="cofirm" value="确定">
        <input type="reset" name="reset">
    </form>
</body>
</html>
