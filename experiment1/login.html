<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="login.css">
    <title>Login</title>
</head>
<body>
<div class="login-card">
    <h2>用 户 登 录</h2>
    <form>
        <div class="input-group">
            <input placeholder="  用户名" type="text" required name="username">
        </div>
        <div class="input-group">
            <input placeholder="  密码" type="password" name="password">
        </div>

        <div class="button-group">
            <!--
            <input type="button" name="confirm" value="确认">
            <input type="button" name="cancel" value="取消">
            -->
            <button type="submit">确认</button>
            <button type="button" onclick="alert('已取消')">取消</button>
        </div>

        <div class="links">
            <a href="https://github.com/HawkinWay">注册用户</a>
            <a href="https://github.com/HawkinWay/WebFrontEnd">忘记密码？</a>
        </div>
    </form>
</div>
</body>
</html>
