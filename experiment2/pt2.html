<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pt2</title>
</head>
<body>
<div class="wordsplay" id="form-section">
    <h3>发表您的评论</h3>
    <form id="commentForm" onsubmit="return validateForm()">
        <div class="form-group">
            <lavel>用户名：</lavel>
            <input type="text" id="username" placeholder="请输入用户名">
            <span id="userTip" class="tip"></span>
        </div>
        <div class="form-group">
            <label>电子邮箱：</label>
            <input type="text" id="email" placeholder="example@mail.com">
        </div>
        <div class="form-group">
            <label>联系电话：</label>
            <input id="phone" placeholder="11位手机号">
        </div>
        <div class="form-group">
            <label>评论密码</label>
            <input type="password" id="pwd" placeholder="至少6位数字或字母">
        </div>
        <button type="submit" class="submit-btn">提交评论</button>
    </form>
</div>

<script>
    function validateForm(){
        var user = document.getElementById("username").value;
        var email = document.getElementById("email").value;
        var phone = document.getElementById("phone").value;
        var pwd = document.getElementById("pwd").value;

        if(user === ""){
            alert("用户名不能为空！");
            document.getElementById("username").focus();
            return false;
        }

        if(user.length < 3 || user.length > 10){
            alert("用户名长度需控制在3-10位之间");
            return false;
        }

        var emailReg = /^\w+([-+.]\w+)*@\w+([-.]\w+)*\.\w+([-.]\w+)*$/;
        if(!emailReg.test(email)){
            alert("电子邮件格式不正确！");
            return false;
        }

        var phoneReg = /^1[3-9]\d{9}$/;
        if (!phoneReg.test(phone)) {
            alert("请输入正确的11位手机号码！");
            return false;
        }

        if (pwd.length < 6) {
            alert("密码长度不能少于6位！");
            return false;
        }

        alert("验证通过，提交成功！");
        return true;
    }
</script>
</body>
</html>
