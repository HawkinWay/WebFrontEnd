<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>searchBox</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div id="search">
    <input type="text" id="searchBox" value="请输入文本" style="color: grey;">
</div>

<script>
    $(document).ready(function(){
        $("#searchBox").focus(function(){
            if($(this).val() === "请输入文本"){
                $(this).val("").css("color","black");
            }
        }).blur(function(){
            if($(this).val() === ""){
                $(this).val("请输入文本").css("color","grey");
            }
        });
    });
</script>
</body>
</html>
