<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tooltips</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="tooltips">
    <span id="myspan">欢迎光临江苏反诈网</span>
</div>

<script>
    $(document).ready(function(){
        $("#myspan").hover(function(e){
            var tooltip = $("<div id='tooltip'>“I'm a tooltip”</div>").css({
            "position": "absolute",
            "background": "#333",
            "color": "#fff",
            "padding": "5px",
            "top": e.pageY + 10 + "px",
            "left": e.pageX + 10 + "px"
        });
            $("body").append(tooltip);
        },function(){
            $("#tooltip").remove();
        });
    });
</script>
</body>
</html>
